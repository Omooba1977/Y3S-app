<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Y3S Admin Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#050911;--s1:#0c1424;--s2:#111c30;--s3:#172340;
    --g2:#f5c840;--em:#00d98b;--red:#ff4d6d;--blue:#4da6ff;
    --w:#f0f4ff;--w2:#c8d4f0;--mu:#7a8ca8;--br:rgba(255,255,255,.08);
    --r:12px;--r2:8px;--ffh:'Arial Black',sans-serif;
  }
  body{background:var(--bg);color:var(--w);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}

  /* LOGIN SCREEN */
  #login-screen{
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:20px;
  }
  .login-card{
    background:var(--s1);border:1px solid var(--br);border-radius:var(--r);
    padding:40px 32px;width:100%;max-width:400px;text-align:center;
  }
  .login-logo{font-family:var(--ffh);font-size:36px;font-weight:900;margin-bottom:6px}
  .login-sub{font-size:13px;color:var(--mu);margin-bottom:32px}
  .login-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);display:block;text-align:left;margin-bottom:6px;font-weight:600}
  .login-input{
    width:100%;padding:13px 14px;background:var(--s2);border:1.5px solid var(--br);
    border-radius:var(--r2);color:var(--w);font-size:15px;margin-bottom:16px;outline:none;
  }
  .login-input:focus{border-color:var(--em)}
  .login-btn{
    width:100%;padding:14px;background:var(--em);border:none;border-radius:var(--r2);
    color:#000;font-weight:800;font-size:15px;cursor:pointer;margin-top:4px;
  }
  .login-btn:hover{opacity:.9}
  .login-err{color:var(--red);font-size:13px;margin-top:10px;min-height:20px}

  /* DASHBOARD */
  #dashboard{display:none}
  .topbar{
    background:var(--s1);border-bottom:1px solid var(--br);
    padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:100;
  }
  .topbar-logo{font-family:var(--ffh);font-size:20px;font-weight:900}
  .topbar-logo span:nth-child(1){color:var(--g2)}
  .topbar-logo span:nth-child(2){color:var(--em)}
  .topbar-logo span:nth-child(3){color:var(--w)}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .admin-badge{font-size:11px;padding:3px 10px;background:rgba(0,217,139,.15);border-radius:20px;color:var(--em);font-weight:700}
  .logout-btn{font-size:12px;padding:6px 14px;background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:var(--r2);color:var(--red);cursor:pointer}

  .main{padding:24px;max-width:1200px;margin:0 auto}
  .page-title{font-size:22px;font-weight:800;margin-bottom:4px}
  .page-sub{font-size:13px;color:var(--mu);margin-bottom:24px}

  /* STAT CARDS */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:28px}
  .stat-card{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);padding:18px;text-align:center}
  .stat-card.green{border-color:rgba(0,217,139,.3);background:rgba(0,217,139,.05)}
  .stat-card.gold{border-color:rgba(245,200,64,.3);background:rgba(245,200,64,.05)}
  .stat-card.blue{border-color:rgba(77,166,255,.3);background:rgba(77,166,255,.05)}
  .stat-card.red{border-color:rgba(255,77,109,.3);background:rgba(255,77,109,.05)}
  .stat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);font-weight:700;margin-bottom:8px}
  .stat-value{font-size:32px;font-weight:900;line-height:1}
  .stat-sub{font-size:11px;color:var(--mu);margin-top:4px}

  /* SECTIONS */
  .section{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);margin-bottom:20px;overflow:hidden}
  .section-header{padding:16px 20px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
  .section-title{font-size:15px;font-weight:700}
  .section-sub{font-size:12px;color:var(--mu)}

  /* TREND BARS */
  .trend-list{padding:16px 20px}
  .trend-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .trend-date{font-size:11px;color:var(--mu);width:80px;flex-shrink:0}
  .trend-bar-wrap{flex:1;background:var(--s2);border-radius:4px;height:8px;overflow:hidden}
  .trend-bar{height:100%;background:var(--em);border-radius:4px;transition:width .3s}
  .trend-count{font-size:12px;font-weight:700;color:var(--em);width:30px;text-align:right}

  /* TIER PIE */
  .tier-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 20px}
  .tier-item{background:var(--s2);border-radius:var(--r2);padding:14px;text-align:center}
  .tier-name{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .tier-count{font-size:24px;font-weight:900}
  .tier-pct{font-size:11px;color:var(--mu);margin-top:2px}

  /* USER TABLE */
  .user-table{width:100%;border-collapse:collapse}
  .user-table th{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);font-weight:700;padding:10px 20px;text-align:left;border-bottom:1px solid var(--br)}
  .user-table td{padding:12px 20px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
  .user-table tr:last-child td{border-bottom:none}
  .user-table tr:hover td{background:rgba(255,255,255,.02)}
  .tier-pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
  .tier-pill.pro{background:rgba(245,200,64,.15);color:var(--g2)}
  .tier-pill.free{background:rgba(255,255,255,.06);color:var(--mu)}

  /* REFRESH BTN */
  .refresh-btn{font-size:12px;padding:6px 14px;background:rgba(0,217,139,.1);border:1px solid rgba(0,217,139,.3);border-radius:var(--r2);color:var(--em);cursor:pointer}
  .refresh-btn:hover{background:rgba(0,217,139,.2)}

  /* LOADING */
  .loading{text-align:center;padding:60px 20px;color:var(--mu);font-size:14px}
  .spinner{width:32px;height:32px;border:3px solid var(--br);border-top-color:var(--em);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ERROR */
  .error-msg{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:var(--r2);padding:14px 18px;color:var(--red);font-size:13px;margin:20px 0}

  /* RESPONSIVE */
  @media(max-width:600px){
    .main{padding:14px}
    .stats-grid{grid-template-columns:repeat(2,1fr)}
    .user-table th:nth-child(4),.user-table td:nth-child(4){display:none}
    .topbar{padding:12px 16px}
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <span>Y</span><span>3</span><span>S</span>
    </div>
    <div class="login-sub">Admin Dashboard — Authorised Access Only</div>

    <label class="login-label">Admin Password</label>
    <input class="login-input" type="password" id="admin-pass" placeholder="Enter admin password"
      onkeypress="if(event.key==='Enter')doAdminLogin()">

    <button class="login-btn" onclick="doAdminLogin()">Access Dashboard</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo"><span>Y</span><span>3</span><span>S</span> &nbsp;Admin</div>
    <div class="topbar-right">
      <span class="admin-badge">Admin</span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="main">
    <div class="page-title">Analytics Dashboard</div>
    <div class="page-sub" id="last-updated">Loading...</div>

    <div id="dashboard-content">
      <div class="loading">
        <div class="spinner"></div>
        Loading data...
      </div>
    </div>
  </div>
</div>

<script>
  var API = 'https://y3s-backend-production.up.railway.app';

  // ADMIN PASSWORD — change this to something only you know
  // This is a client-side check — the real security is the backend JWT
  var ADMIN_PASSWORD = 'Y3Sadmin2025!';

  var adminToken = sessionStorage.getItem('y3s_admin_token');
  if(adminToken){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadData();
  }

  function doAdminLogin(){
    var pass = document.getElementById('admin-pass').value;
    var err = document.getElementById('login-err');
    if(!pass){err.textContent='Please enter the admin password.';return;}
    if(pass !== ADMIN_PASSWORD){err.textContent='Incorrect password. Try again.';return;}

    // Password OK — now get a backend token using admin credentials
    err.textContent='Authenticating...';
    fetch(API+'/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        email:'hello@y3sapp.com',
        name:'Admin',
        password:'Y3SadminBackend2025'
      })
    }).then(function(r){return r.json();}).then(function(data){
      if(data.token){
        sessionStorage.setItem('y3s_admin_token', data.token);
        adminToken = data.token;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('dashboard').style.display='block';
        loadData();
      } else {
        // Token not needed for display - use stored approach
        // Admin sees the dashboard regardless, API calls use a separate admin key
        sessionStorage.setItem('y3s_admin_token', 'local_admin_' + Date.now());
        adminToken = sessionStorage.getItem('y3s_admin_token');
        document.getElementById('login-screen').style.display='none';
        document.getElementById('dashboard').style.display='block';
        loadData();
      }
    }).catch(function(){
      // Backend unreachable — still show dashboard if password correct
      sessionStorage.setItem('y3s_admin_token', 'local_admin_' + Date.now());
      adminToken = sessionStorage.getItem('y3s_admin_token');
      document.getElementById('login-screen').style.display='none';
      document.getElementById('dashboard').style.display='block';
      loadData();
    });
  }

  function doLogout(){
    sessionStorage.removeItem('y3s_admin_token');
    adminToken = null;
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('dashboard').style.display='none';
    document.getElementById('admin-pass').value='';
    document.getElementById('login-err').textContent='';
  }

  function loadData(){
    document.getElementById('last-updated').textContent='Loading...';
    document.getElementById('dashboard-content').innerHTML=
      '<div class="loading"><div class="spinner"></div>Fetching data from backend...</div>';

    fetch(API+'/api/admin/stats',{
      headers:{'Authorization':'Bearer '+adminToken}
    }).then(function(r){return r.json();}).then(function(data){
      if(data.error && data.error.includes('Admin access')){
        // Need a proper admin token - try registering admin user
        return registerAdminAndRetry();
      }
      renderDashboard(data);
    }).catch(function(e){
      renderError('Could not connect to backend. Make sure Railway is running.<br><small style="color:var(--mu)">'+e.message+'</small>');
    });
  }

  function registerAdminAndRetry(){
    // Try to register/login the admin user on backend
    fetch(API+'/api/auth/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:'Y3S Admin',email:'hello@y3sapp.com',password:'Y3SadminBackend2025'})
    }).then(function(r){return r.json();}).then(function(data){
      var token = data.token;
      if(!token){
        // Try login
        return fetch(API+'/api/auth/login',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({email:'hello@y3sapp.com',name:'Y3S Admin',password:'Y3SadminBackend2025'})
        }).then(function(r2){return r2.json();}).then(function(d2){return d2.token;});
      }
      return token;
    }).then(function(token){
      if(token){
        sessionStorage.setItem('y3s_admin_token',token);
        adminToken=token;
        return fetch(API+'/api/admin/stats',{headers:{'Authorization':'Bearer '+token}})
          .then(function(r){return r.json();}).then(renderDashboard);
      }
      renderError('Could not authenticate admin account. Check ADMIN_EMAILS in routes/admin.js includes hello@y3sapp.com');
    }).catch(function(e){
      renderError('Auth error: '+e.message);
    });
  }

  function renderDashboard(data){
    var now = new Date().toLocaleString('en-GB',{dateStyle:'medium',timeStyle:'short'});
    document.getElementById('last-updated').textContent='Last updated: '+now;

    var total = data.total_users||0;
    var pro = data.pro_users||0;
    var free = data.free_users||(total-pro);
    var today = data.new_today||0;
    var week = data.new_this_week||0;
    var month = data.new_this_month||0;
    var trend = data.signup_trend||[];
    var tiers = data.tier_breakdown||[];
    var users = data.users||[];

    var maxTrend = Math.max.apply(null, trend.map(function(t){return t.count;})) || 1;

    var html = '';

    // STAT CARDS
    html += '<div class="stats-grid">';
    html += statCard('Total Users', total, '', 'green');
    html += statCard('Pro Members', pro, (total>0?Math.round(pro/total*100):0)+'% of total', 'gold');
    html += statCard('Free Users', free, '', '');
    html += statCard('New Today', today, '', today>0?'green':'');
    html += statCard('This Week', week, '', 'blue');
    html += statCard('This Month', month, '', 'blue');
    html += '</div>';

    // SIGNUP TREND + TIER BREAKDOWN side by side
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">';

    // Trend
    html += '<div class="section">';
    html += '<div class="section-header"><span class="section-title">Signup Trend (14 days)</span></div>';
    html += '<div class="trend-list">';
    if(trend.length===0){
      html += '<div style="color:var(--mu);font-size:13px;padding:10px 0">No trend data yet</div>';
    } else {
      trend.forEach(function(t){
        var w = Math.round((t.count/maxTrend)*100);
        html += '<div class="trend-row">'
          +'<span class="trend-date">'+t.date.slice(5)+'</span>'
          +'<div class="trend-bar-wrap"><div class="trend-bar" style="width:'+w+'%"></div></div>'
          +'<span class="trend-count">'+t.count+'</span>'
          +'</div>';
      });
    }
    html += '</div></div>';

    // Tier breakdown
    html += '<div class="section">';
    html += '<div class="section-header"><span class="section-title">Plan Breakdown</span></div>';
    html += '<div class="tier-grid">';
    if(tiers.length===0){
      html += '<div style="color:var(--mu);font-size:13px;padding:10px;grid-column:1/-1">No tier data yet</div>';
    } else {
      tiers.forEach(function(t){
        var pct = total>0?Math.round(t.count/total*100):0;
        html += '<div class="tier-item">'
          +'<div class="tier-name">'+(t.tier||'unknown').toUpperCase()+'</div>'
          +'<div class="tier-count" style="color:'+(t.tier==='pro'?'var(--g2)':'var(--mu)')+'">'+t.count+'</div>'
          +'<div class="tier-pct">'+pct+'% of users</div>'
          +'</div>';
      });
    }
    html += '</div></div>';
    html += '</div>';

    // USER TABLE
    html += '<div class="section">';
    html += '<div class="section-header">'
      +'<div><span class="section-title">Recent Users</span><br><span class="section-sub">Last 20 signups</span></div>'
      +'</div>';
    if(users.length===0){
      html += '<div class="loading" style="padding:30px">No users yet</div>';
    } else {
      html += '<table class="user-table"><thead><tr>'
        +'<th>#</th><th>Name</th><th>Email</th><th>Plan</th><th>Joined</th>'
        +'</tr></thead><tbody>';
      users.forEach(function(u,i){
        html += '<tr>'
          +'<td style="color:var(--mu)">'+(i+1)+'</td>'
          +'<td style="font-weight:600">'+esc(u.name)+'</td>'
          +'<td style="color:var(--mu)">'+esc(u.email)+'</td>'
          +'<td><span class="tier-pill '+(u.tier||'free')+'">'+(u.tier||'free').toUpperCase()+'</span></td>'
          +'<td style="color:var(--mu)">'+esc(u.created_at||'—')+'</td>'
          +'</tr>';
      });
      html += '</tbody></table>';
    }
    html += '</div>';

    document.getElementById('dashboard-content').innerHTML = html;
  }

  function statCard(label, value, sub, cls){
    return '<div class="stat-card'+(cls?' '+cls:'')+'">'
      +'<div class="stat-label">'+label+'</div>'
      +'<div class="stat-value">'+value+'</div>'
      +(sub?'<div class="stat-sub">'+sub+'</div>':'')
      +'</div>';
  }

  function renderError(msg){
    document.getElementById('dashboard-content').innerHTML=
      '<div class="error-msg">⚠️ '+msg+'</div>';
  }

  function esc(s){
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
